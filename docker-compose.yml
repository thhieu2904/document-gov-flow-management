services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: document_flow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d document_flow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - FRONTEND_URL=https://vanbanxalongphu.shop
      - CORS_ORIGINS=https://vanbanxalongphu.shop,http://localhost
      - DATABASE_URL=postgresql+psycopg://admin:adminpassword@postgres:5432/document_flow
      - AUTH_PROVIDER=local
      - STORAGE_PROVIDER=local
      - LOCAL_STORAGE_PATH=/app/uploads
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-thay-doi-key-nay-truoc-khi-chay}
      - JWT_EXPIRES_MINUTES=1440
      - MAX_UPLOAD_MB=50
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@vanbanxalongphu.info.vn}
      - SMTP_FROM_NAME=Hệ thống Quản lý Văn bản
    volumes:
      - type: bind
        source: "${UPLOADS_HOST_PATH:-D:/QLVB/uploads}"
        target: /app/uploads
        bind:
          create_host_path: false

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - frontend

volumes:
  postgres_data:
